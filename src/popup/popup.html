<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PR Review Helper</title>
    <style>
      body {
        color: #24292f;
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        width: 280px;
      }

      main {
        padding: 14px;
      }

      h1 {
        font-size: 16px;
        margin: 0 0 8px;
      }

      p {
        color: #57606a;
        margin: 0 0 12px;
      }

      button {
        background: #0969da;
        border: 1px solid #0969da;
        border-radius: 8px;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        padding: 8px 10px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PR Review Helper</h1>
      <p>Open a GitHub pull request Files changed tab to see the review summary and hidden-file controls.</p>
      <button id="openOptions" type="button">Open Settings</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
